name: Release
# v0.1.0 — arm64 + linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string
      publish_npm:
        description: 'Publish to npm public registry'
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: marcuzgabriel-dedicated
            target: aarch64-apple-darwin
            asset: hermes-test-darwin-arm64
            pkg: hermes-test-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: hermes-test-linux-x64
            pkg: hermes-test-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set PATH for self-hosted runner
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/bin:/usr/local/bin" >> $GITHUB_PATH

      - name: Clone Hermes
        run: |
          for i in 1 2 3; do
            git clone --filter=blob:none https://github.com/facebook/hermes.git vendor/hermes && break
            echo "Attempt $i failed, retrying..."
            rm -rf vendor/hermes
            sleep 5
          done
          cd vendor/hermes
          git checkout fd0e1d3ed
          sed -i.bak 's/FATAL_ERROR "Host compiler/WARNING "Host compiler/g' external/llvh/cmake/modules/CheckAtomic.cmake
          # GCC needs explicit <cstdint> for std::uint8_t (Clang includes it transitively)
          sed -i.bak '1s/^/#include <cstdint>\n/' lib/Platform/Intl/impl_icu/IntlUtils.cpp

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libicu-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: oven-sh/setup-bun@v2

      - name: Build Hermes
        run: |
          cd vendor/hermes
          cmake -S . -B build -G Ninja \
            -DHERMES_STATIC_LINK=OFF -DBUILD_SHARED_LIBS=OFF \
            -DHERMES_BUILD_APPLE_FRAMEWORK=OFF -DHERMES_ENABLE_DEBUGGER=OFF \
            -DHERMES_ENABLE_INTL=ON \
            -DHERMES_ENABLE_TEST_SUITE=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 4
          mkdir -p build/external/llvh/include/llvh/IR
          test -f build/external/llvh/include/llvh/IR/Attributes.inc || printf 'Alignment,\nAllocSize,\nAlwaysInline,\nArgMemOnly,\nBuiltin,\nByVal,\nCold,\nConvergent,\nDereferenceable,\nDereferenceableOrNull,\nInaccessibleMemOnly,\nInaccessibleMemOrArgMemOnly,\nInAlloca,\nInlineHint,\nInReg,\nJumpTable,\nMinSize,\nNaked,\nNest,\nNoAlias,\nNoBuiltin,\nNoCapture,\nNoCfCheck,\nNoDuplicate,\nNoFree,\nNoImplicitFloat,\nNoInline,\nNoRecurse,\nNoReturn,\nNoSync,\nNoUnwind,\nNonLazyBind,\nNonNull,\nOptForFuzzing,\nOptimizeForSize,\nOptimizeNone,\nReadNone,\nReadOnly,\nReturned,\nReturnsTwice,\nSExt,\nSafeStack,\nSanitizeAddress,\nSanitizeHWAddress,\nSanitizeMemory,\nSanitizeThread,\nShadowCallStack,\nSpeculatable,\nSpeculativeLoadHardening,\nStackAlignment,\nStackProtect,\nStackProtectReq,\nStackProtectStrong,\nStrictFP,\nStructRet,\nSwiftError,\nSwiftSelf,\nUWTable,\nWillReturn,\nWriteOnly,\nZExt,\n' > build/external/llvh/include/llvh/IR/Attributes.inc

      - name: Bundle harness
        run: |
          cd packages/hermes-test
          node -e "const p=require('./package.json'); delete p.optionalDependencies; require('fs').writeFileSync('./package.json', JSON.stringify(p,null,2)+'\n')"
          bun install --no-save
          node bundle.mjs
          git checkout package.json

      - name: Sync Cargo.toml version
        run: sed -i.bak "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" crates/hermes-test-cli/Cargo.toml

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: cp target/${{ matrix.target }}/release/hermes-test ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          VERSION=${{ inputs.version }}
          for dir in packages/hermes-test packages/hermes-test-darwin-arm64 packages/hermes-test-linux-x64; do
            node -e "
              const pkg = require('./${dir}/package.json');
              pkg.version = '${VERSION}';
              if (pkg.optionalDependencies) {
                for (const k of Object.keys(pkg.optionalDependencies)) {
                  pkg.optionalDependencies[k] = '${VERSION}';
                }
              }
              require('fs').writeFileSync('./${dir}/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Commit version bump
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "marcuzgabriel"
          git config user.email "marcuzgabriel@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/marcuzgabriel/hermes-test.git
          sed -i "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" crates/hermes-test-cli/Cargo.toml
          git add packages/*/package.json crates/hermes-test-cli/Cargo.toml
          git diff --cached --quiet || git commit -m "v${{ inputs.version }}"
          git push origin HEAD

      - name: Create tag
        run: |
          git tag v${{ inputs.version }} || true
          git push origin v${{ inputs.version }} || true

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            hermes-test-darwin-arm64/hermes-test-darwin-arm64
            hermes-test-linux-x64/hermes-test-linux-x64
          generate_release_notes: true

      # --- GitHub Packages (always) ---
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: |
          for pkg in darwin-arm64 linux-x64; do
            cd packages/hermes-test-${pkg}
            mkdir -p bin
            cp ../../hermes-test-${pkg}/hermes-test-${pkg} bin/hermes-test
            chmod +x bin/hermes-test
            npm publish || true
            cd ../..
          done
          cd packages/hermes-test && npm publish || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- npm public (opt-in) ---
      - name: Setup npm public registry
        if: ${{ inputs.publish_npm }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        if: ${{ inputs.publish_npm }}
        run: |
          for pkg in darwin-arm64 linux-x64; do
            cd packages/hermes-test-${pkg}
            mkdir -p bin
            cp ../../hermes-test-${pkg}/hermes-test-${pkg} bin/hermes-test
            chmod +x bin/hermes-test
            npm publish --access public || true
            cd ../..
          done
          cd packages/hermes-test && npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
