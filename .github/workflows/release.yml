name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            target: aarch64-apple-darwin
            asset: hermes-test-darwin-arm64
          - os: macos-13        # Intel Mac
            target: x86_64-apple-darwin
            asset: hermes-test-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: hermes-test-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Hermes
        run: |
          cd vendor/hermes
          cmake -S . -B build -G Ninja \
            -DHERMES_STATIC_LINK=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target hermesVMRuntime hermes-engine-cdp

      - name: Bundle harness
        run: |
          cd packages/hermes-test
          bun install
          node bundle.mjs

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: cp target/${{ matrix.target }}/release/hermes-test ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hermes-test-darwin-arm64/hermes-test-darwin-arm64
            hermes-test-darwin-x64/hermes-test-darwin-x64
            hermes-test-linux-x64/hermes-test-linux-x64
          generate_release_notes: true
