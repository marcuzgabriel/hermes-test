name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: hermes-test-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: hermes-test-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone Hermes
        run: |
          git clone https://github.com/facebook/hermes.git vendor/hermes
          cd vendor/hermes
          git checkout fd0e1d3ed
          sed -i.bak 's/FATAL_ERROR "Host compiler/WARNING "Host compiler/g' external/llvh/cmake/modules/CheckAtomic.cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libicu-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Hermes
        run: |
          cd vendor/hermes
          cmake -S . -B build -G Ninja \
            -DHERMES_STATIC_LINK=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DHERMES_BUILD_APPLE_FRAMEWORK=OFF \
            -DHERMES_ENABLE_DEBUGGER=OFF \
            -DHERMES_ENABLE_TEST_SUITE=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 4

      - name: Verify Hermes libraries
        run: |
          for lib in hermesvm hermesVMRuntime hermesFrontend hermesOptimizer hermesCompilerDriver hermesHBCBackend hermesBackend hermesInst hermesFrontEndDefs hermesParser hermesAST hermesFlowParser hermesAST2JS hermesSourceMap hermesInternalBytecode hermesRegex hermesPlatformUnicode hermesPlatform hermesSupport hermesADT hermesPublic dtoa LLVHSupport LLVHDemangle; do
            found=$(find vendor/hermes/build -name "lib${lib}.a" | head -1)
            if [ -z "$found" ]; then
              echo "MISSING: lib${lib}.a"
              exit 1
            else
              echo "OK: $found"
            fi
          done

      - name: Bundle harness
        run: |
          cd packages/hermes-test
          bun install --no-save
          node bundle.mjs
          ls -la dist/harness.bundle.js

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: cp target/${{ matrix.target }}/release/hermes-test ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in all packages
        run: |
          VERSION=${{ inputs.version }}
          for dir in packages/hermes-test packages/hermes-test-darwin-arm64 packages/hermes-test-linux-x64; do
            node -e "
              const pkg = require('./${dir}/package.json');
              pkg.version = '${VERSION}';
              if (pkg.optionalDependencies) {
                for (const k of Object.keys(pkg.optionalDependencies)) {
                  pkg.optionalDependencies[k] = '${VERSION}';
                }
              }
              require('fs').writeFileSync('./${dir}/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/hermes-test/package.json packages/hermes-test-darwin-arm64/package.json packages/hermes-test-linux-x64/package.json
          git diff --cached --quiet || git commit -m "v${{ inputs.version }}"
          git push origin main

      - name: Create tag
        run: |
          git tag v${{ inputs.version }} || true
          git push origin v${{ inputs.version }} || true

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            hermes-test-darwin-arm64/hermes-test-darwin-arm64
            hermes-test-linux-x64/hermes-test-linux-x64
          generate_release_notes: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish platform packages
        run: |
          # darwin-arm64
          cd packages/hermes-test-darwin-arm64
          mkdir -p bin
          cp ../../hermes-test-darwin-arm64/hermes-test-darwin-arm64 bin/hermes-test
          chmod +x bin/hermes-test
          npm publish
          cd ../..

          # linux-x64
          cd packages/hermes-test-linux-x64
          mkdir -p bin
          cp ../../hermes-test-linux-x64/hermes-test-linux-x64 bin/hermes-test
          chmod +x bin/hermes-test
          npm publish
          cd ../..
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish main package
        run: |
          cd packages/hermes-test
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
