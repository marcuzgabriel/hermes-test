[package]
name = "hermes-test-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "hermes-test"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde_json = "1"
notify = "7"
notify-debouncer-mini = "0.5"
regex = "1"
oxc = { version = "0.132", features = ["transformer", "codegen", "semantic", "ast_visit"] }
oxc_str = "0.132"
libc = "0.2"

[build-dependencies]
cc = "1"
